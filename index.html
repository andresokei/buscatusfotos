<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Contáctame! | Busca Tus Fotos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f7f9fc;
    }

    h1 {
      color: #2c3e50;
      margin-top: 40px;
    }

    p {
      margin-bottom: 30px;
      color: #34495e;
    }

    form {
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      margin: 0 auto;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
      color: #34495e;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      background: linear-gradient(45deg, #007BFF, #0056b3);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(45deg, #0056b3, #003d80);
    }

    .instagram {
      margin-top: 30px;
      text-align: center;
    }

    .instagram img {
      margin-top: 10px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>¡Hola, bienvenido a Busca Tus Fotos!</h1>
  <p>Por favor, usa este formulario para contactarme y pedir tus fotos de surf.</p>
  
  <form action="https://formspree.io/f/xwpkjjql" method="POST">
    <label for="email">Tu correo:</label>
    <input type="email" id="email" name="email" placeholder="Escribe tu correo" required>
    
    <label for="message">Tu mensaje:</label>
    <textarea id="message" name="message" placeholder="Escribe tu mensaje aquí..." rows="5" required></textarea>
    
    <button type="submit">Enviar</button>
  </form>

  <div class="instagram">
    <a href="https://instagram.com/andresokei" target="_blank" style="text-decoration: none; color: inherit;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram" width="30" style="vertical-align: middle;">
      Sígueme en Instagram (@andresokei)
    </a>
    <p>Mira algunas fotos de mis sesiones:</p>
    <iframe src="https://snapwidget.com/embed/12345" class="snapwidget-widget" allowtransparency="true" frameborder="0" scrolling="no" style="border:none; overflow:hidden; width:100%; height:300px;"></iframe>
  </div>

  <div class="footer">
    <p>© 2024 Busca Tus Fotos. Todos los derechos reservados.</p>
  </div>
</body>
</html>
